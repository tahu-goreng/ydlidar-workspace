slam_toolbox:
  ros__parameters:

    # =========================
    # MODE
    # =========================
    use_sim_time: false
    mode: localization

    # =========================
    # MAP INPUT
    # =========================
    map_file_name: "/home/waesco704/maps/final_map.yaml"
    map_start_at_dock: false
    use_map_topic: true     # WAJIB untuk localization

    # =========================
    # INITIAL POSE
    # =========================
    # Bisa di-set manual via RViz (2D Pose Estimate)
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0

    # =========================
    # SENSOR
    # =========================
    scan_topic: /scan
    subscribe_scan_qos: sensor_data

    # =========================
    # FRAME DEFINITIONS
    # =========================
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # =========================
    # SCAN MATCHING
    # =========================
    use_scan_matching: true
    use_imu: false

    # =========================
    # MOTION FILTER
    # =========================
    minimum_travel_distance: 0.02
    minimum_travel_heading: 0.02

    # =========================
    # TF PUBLISHING
    # =========================
    transform_publish_period: 0.05
    transform_timeout: 0.5

    # =========================
    # LASER
    # =========================
    resolution: 0.05
    max_laser_range: 10.0
    min_laser_range: 0.05

    # =========================
    # STABILITY
    # =========================
    enable_interactive_mode: false
    debug_logging: false

